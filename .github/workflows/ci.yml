name: CI Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libncursesw5-dev zip unzip

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # macOS provides clang++ with C++17 support, ncurses, zip, and unzip
          # out of the box. Install Python packages for doc generation.
          pip3 install --break-system-packages markdown weasyprint || pip3 install markdown weasyprint || true

      - name: Build
        run: make

      #- name: Build and run tests
      #  run: make runtest

      - name: Build macOS release archive
        if: matrix.os == 'macos-latest'
        run: |
          # The release script uses 'bash' in the shebang; ensure it works on macOS
          make nixReleaseArc

      - name: Upload macOS release artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: SlyMail-macOS-release
          path: SlyMail_*_Darwin.zip
          retention-days: 90
